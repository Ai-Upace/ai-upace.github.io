<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 | 登录</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/assets-cn/styles/join-cn.css">
</head>
<body>
    <form action="#" method="post">
        <label for="username">用户名:</label>
        <input type="text" id="username" name="username" placeholder="用户名" required><i class='bx bxs-user' ></i>
        <br>
        <label for="email">邮箱:</label>
        <input type="email" id="email" name="email" placeholder="邮箱" required><i class='bx bxs-envelope' ></i>
        <br>
        <label for="password">密码:</label>
        <input type="password" id="password" name="password" placeholder="密码" required><i class='bx bxs-lock-alt' ></i>
        <br>
        <label for="repassword">重新输入密码:</label>
        <input type="repassword" id="repassword" name="repassword" placeholder="重新输入密码" required><i class='bx bxs-lock-open-alt' ></i>
        <br>
        <span class="message"><small>重新输入密码</small></span>
        <br>
        <a href="#">已用账号？登录！</a>
        <br>
        <button class="joinButton" type="submit">提交</button>
        <br>
        <div class="ways">
            <p>还可以通过下列方式注册</p>
            <div class="icons">
                <a href="#" class="github"><i class='bx bxl-github' ></i></a>
                <a href="#" class="google"></i><i class='bx bxl-google' ></i></i></a>
                <a href="#" class="facebook"><i class='bx bxl-facebook-square' ></i></i></a>
                <a href="#" class="outlook"><i class='bx bxl-microsoft' ></i></a>
            </div>
        </div>
        <br>
    </form>
    <a href="/index-cn.html"><button class="home">返回主页</button></a>
</body>
</html>
